<!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>扫码比对</title>
    </head>
    <body>
        <style>
            body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            background: linear-gradient(135deg, #e0e7ff 0%, #f4f4f4 100%);
            justify-content: center;
            min-height: 100vh;
            }
            h2 {
            color: #333;
            margin-bottom: 20px;
            }
            h3 {
            color: #555;
            margin-top: 20px;
            margin-bottom: 10px;
            }
            input[type="text"] {
            width: 300px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            }
            #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            }
            button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            }
            button:hover {
            background-color: #0056b3;
            }
        </style>
        <h2>请扫码</h2>
        <h3>二维码1</h3>
        <input type="text" id="code1" autocomplete="off">
        <h3>二维码2</h3>
        <input type="text" id="code2" autocomplete="off">
        <div id="result"></div>
        <script>
            window.onload = ()=> document.getElementById("code1").focus();
            document.getElementById("code1").addEventListener("keydown", (e)=>{
                if(e.key === "Enter"){
                    document.getElementById("code2").focus();
                }
            });
            document.getElementById("code2").addEventListener("keydown", (e)=>{
                if(e.key === "Enter"){
                    fetch("/check", {
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body: JSON.stringify({code1: document.getElementById("code1").value, code2: document.getElementById("code2").value})
                    }).then(res=>res.json()).then(data=>{
                        document.getElementById("result").innerText = data.msg;
                        document.getElementById("result").style.color = data.ok ? "green" : "red";
                        if(data.ok){
                            document.getElementById("code1").value = "";
                            document.getElementById("code2").value = "";
                            document.getElementById("code1").focus();
                            document.getElementById("result").innerText = "";
                        }
                        else{
                            alert("比对失败，请重新扫码");
                            document.getElementById("code1").value = "";
                            document.getElementById("code2").value = "";
                            document.getElementById("code1").focus();
                            document.getElementById("result").innerText = "";
                        }
                    });
                }
            });
        </script>
        <button onclick="window.location.href='/history'">查看历史记录</button>
    </body>
    </html>
