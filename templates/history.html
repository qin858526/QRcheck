<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比对历史记录查询</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .search-bar {
            padding: 25px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        #searchInput {
            padding: 12px 20px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            width: 350px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        #searchInput::placeholder {
            color: #adb5bd;
        }
        
        .search-bar button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        
        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .search-bar button:active {
            transform: translateY(0);
        }
        
        .table-container {
            padding: 30px;
            overflow-x: auto;
        }
        
        #dataTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        #dataTable thead {
            background: linear-gradient(135deg, #495057 0%, #343a40 100%);
            color: white;
        }
        
        #dataTable th {
            padding: 16px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        #dataTable th:first-child {
            border-top-left-radius: 8px;
        }
        
        #dataTable th:last-child {
            border-top-right-radius: 8px;
        }
        
        #dataTable td {
            padding: 14px 15px;
            border-bottom: 1px solid #e9ecef;
            color: #495057;
            transition: all 0.2s ease;
        }
        
        #dataTable tbody tr {
            transition: all 0.2s ease;
        }
        
        #dataTable tbody tr:hover {
            background-color: #f8f9ff;
            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        #dataTable tbody tr:nth-child(even) {
            background-color: #fafbfc;
        }
        
        #dataTable tbody tr:nth-child(even):hover {
            background-color: #f8f9ff;
        }
        
        #dataTable tbody tr:last-child td {
            border-bottom: none;
        }
        
        .result-success {
            color: #28a745;
            font-weight: 600;
        }
        
        .result-error {
            color: #dc3545;
            font-weight: 600;
        }
        
        .back-btn-container {
            padding: 20px 30px;
            background: #f8f9fa;
            text-align: center;
            border-top: 2px solid #e9ecef;
        }
        
        .back-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.4);
        }
        
        .back-btn:active {
            transform: translateY(0);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .empty-state-text {
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            
            .container {
                border-radius: 12px;
            }
            
            .header {
                padding: 20px;
            }
            
            h2 {
                font-size: 22px;
            }
            
            .search-bar {
                padding: 20px 15px;
                flex-direction: column;
                align-items: stretch;
            }
            
            #searchInput {
                width: 100%;
            }
            
            .search-bar button {
                width: 100%;
            }
            
            .table-container {
                padding: 20px 15px;
            }
            
            #dataTable {
                font-size: 13px;
            }
            
            #dataTable th,
            #dataTable td {
                padding: 10px 8px;
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📋 比对历史记录查询</h2>
            <p class="subtitle">查看和管理所有二维码比对记录</p>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 搜索记录（二维码内容）">
            <button onclick="filterTable()">搜 索</button>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>二维码 1</th>
                        <th>二维码 2</th>
                        <th>时间</th>
                        <th>操作用户</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody>
                    {% for record in records %}
                    <tr>
                        <td>{{ record[0] }}</td>
                        <td>{{ record[1] }}</td>
                        <td>{{ record[2] }}</td>
                        <td>{{ record[3] }}</td>
                        <td>{{ record[4] }}</td>
                        <td>{{ record[5] }}</td>
                        <td>{{ record[6] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            
            {% if not records %}
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-text">暂无比对记录</div>
            </div>
            {% endif %}
        </div>
        <div class="pagination-container" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; padding: 10px;">
            <button id="prevPage" onclick="changePage(-1)" style="padding: 8px 16px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;" disabled>上一页</button>
            <span id="pageInfo" style="font-size: 14px; color: #495057; font-weight: 600;">第 1 页 / 共 1 页</span>
            <button id="nextPage" onclick="changePage(1)" style="padding: 8px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;" disabled>下一页</button>
        </div>

        <script>
            const ITEMS_PER_PAGE = 10;
            let currentPage = 1;
            let allRows = [];
            let filteredRows = [];

            function initPagination() {
                const table = document.getElementById("dataTable");
                const tbody = table.getElementsByTagName("tbody")[0];
                allRows = Array.from(tbody.getElementsByTagName("tr"));
                filteredRows = [...allRows];
                
                if (allRows.length === 0) {
                    document.querySelector('.pagination-container').style.display = 'none';
                    return;
                }
                
                renderPage(1);
            }

            function renderPage(page) {
                const totalPages = Math.ceil(filteredRows.length / ITEMS_PER_PAGE);
                
                if (page < 1) page = 1;
                if (page > totalPages) page = totalPages;
                
                currentPage = page;
                
                allRows.forEach(row => row.style.display = 'none');
                
                const start = (page - 1) * ITEMS_PER_PAGE;
                const end = Math.min(start + ITEMS_PER_PAGE, filteredRows.length);
                
                for (let i = start; i < end; i++) {
                    filteredRows[i].style.display = '';
                }
                
                document.getElementById('pageInfo').textContent = `第 ${page} 页 / 共 ${totalPages} 页`;
                
                document.getElementById('prevPage').disabled = page === 1;
                document.getElementById('nextPage').disabled = page === totalPages;
                
                const prevBtn = document.getElementById('prevPage');
                const nextBtn = document.getElementById('nextPage');
                
                prevBtn.style.opacity = page === 1 ? '0.5' : '1';
                // 页码跳转输入框
                let pageJumpInput = document.getElementById('pageJumpInput');
                if (!pageJumpInput) {
                    pageJumpInput = document.createElement('input');
                    pageJumpInput.type = 'number';
                    pageJumpInput.id = 'pageJumpInput';
                    pageJumpInput.min = 1;
                    pageJumpInput.style.width = '60px';
                    pageJumpInput.style.margin = '0 8px';
                    pageJumpInput.style.padding = '6px 8px';
                    pageJumpInput.style.border = '1px solid #dee2e6';
                    pageJumpInput.style.borderRadius = '4px';
                    pageJumpInput.style.fontSize = '14px';
                    pageJumpInput.placeholder = '页码';
                    const pageInfo = document.getElementById('pageInfo');
                    pageInfo.parentNode.insertBefore(pageJumpInput, pageInfo.nextSibling);

                    pageJumpInput.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            let val = parseInt(pageJumpInput.value);
                            const totalPages = Math.ceil(filteredRows.length / ITEMS_PER_PAGE);
                            if (!isNaN(val) && val >= 1 && val <= totalPages) {
                                renderPage(val);
                            }
                        }
                    });
                }
                // 更新最大页码
                pageJumpInput.max = totalPages;
                pageJumpInput.value = page;
                prevBtn.style.cursor = page === 1 ? 'not-allowed' : 'pointer';
                
                nextBtn.style.opacity = page === totalPages ? '0.5' : '1';
                nextBtn.style.cursor = page === totalPages ? 'not-allowed' : 'pointer';
            }

            function changePage(delta) {
                const totalPages = Math.ceil(filteredRows.length / ITEMS_PER_PAGE);
                const newPage = currentPage + delta;
                
                if (newPage >= 1 && newPage <= totalPages) {
                    renderPage(newPage);
                }
            }

            function filterTable() {
                var input = document.getElementById("searchInput").value.toLowerCase();
                // var table = document.getElementById("dataTable");
                // var tbody = table.getElementsByTagName("tbody")[0];
                // var trs = tbody.getElementsByTagName("tr");
                
                filteredRows = [];
                
                for (var i = 0; i < allRows.length; i++) {
                    var show = false;
                    var tds = allRows[i].getElementsByTagName("td");
                    if (tds.length >= 3) {
                        var qr1 = tds[1].innerText.toLowerCase();
                        var qr2 = tds[2].innerText.toLowerCase();
                        
                        if (qr1.indexOf(input) > -1 || qr2.indexOf(input) > -1) {
                            show = true;
                        }
                    }
                    
                    if (show) {
                        filteredRows.push(allRows[i]);
                    }
                }
                
                currentPage = 1;
                
                if (filteredRows.length === 0) {
                    allRows.forEach(row => row.style.display = 'none');
                    document.getElementById('pageInfo').textContent = '第 0 页 / 共 0 页';
                    document.getElementById('prevPage').disabled = true;
                    document.getElementById('nextPage').disabled = true;
                } else {
                    renderPage(1);
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                initPagination();
            });
        </script>
        <div class="back-btn-container">
            <button class="back-btn" onclick="window.location.href='/check'">← 返回扫码比对</button>
        </div>
    </div>
    <script>
(function() {
    const filterState = { query: '', user: '', result: '' };
    const columnIndex = { user: 4, result: 5 };
    const headerConfig = [
        { key: 'user', title: '操作用户' },
        { key: 'result', title: '结果' }
    ];

    function injectStyles() {
        const style = document.createElement('style');
        style.textContent = `
            .header-filter-wrapper { position: relative; display: inline-flex; align-items: center; gap: 4px; }
            .header-filter-label { cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
            .header-filter-arrow { transition: transform .25s ease; font-size: 12px; }
            .header-filter-dropdown { position: absolute; top: calc(100% + 8px); right: 0; left: 0; background: #fff; border: 1px solid #dee2e6; border-radius: 8px; box-shadow: 0 12px 24px rgba(0,0,0,.12); z-index: 20; max-height: 260px; overflow: auto; display: none; }
            .header-filter-dropdown.visible { display: block; }
            .header-filter-dropdown button { width: 100%; padding: 10px 12px; border: none; background: transparent; text-align: left; font-size: 13px; color: #495057; cursor: pointer; }
            .header-filter-dropdown button:hover { background: #f8f9ff; }
            .header-filter-dropdown button.active { background: #eff2ff; font-weight: 700; }
        `;
        document.head.appendChild(style);
    }

    function findHeaderCell(title) {
        const headers = document.querySelectorAll('#dataTable thead th');
        return Array.from(headers).find(th => th.textContent.trim().startsWith(title));
    }

    function getUniqueValues(key) {
        const idx = columnIndex[key];
        const set = new Set();
        Array.from(document.querySelectorAll('#dataTable tbody tr')).forEach(row => {
            const cell = row.cells[idx];
            if (cell) set.add(cell.innerText.trim());
        });
        return ['全部', ...Array.from(set).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'))];
    }

    function updateHeaderLabels() {
        headerConfig.forEach(cfg => {
            const th = findHeaderCell(cfg.title);
            const label = th?.querySelector('.header-filter-label');
            if (label) {
                const value = filterState[cfg.key] || '全部';
                label.firstChild.textContent = `${cfg.title}：${value}`;
            }
        });
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.header-filter-dropdown.visible').forEach(dropdown => {
            dropdown.classList.remove('visible');
            const arrow = dropdown.parentElement?.querySelector('.header-filter-arrow');
            if (arrow) arrow.style.transform = '';
        });
    }

    function buildDropdown(th, cfg) {
        th.style.position = 'relative';
        const wrapper = document.createElement('div');
        wrapper.className = 'header-filter-wrapper';
        const label = document.createElement('span');
        label.className = 'header-filter-label';
        label.innerHTML = `<span>${cfg.title}：全部</span><span class="header-filter-arrow">▾</span>`;
        const dropdown = document.createElement('div');
        dropdown.className = 'header-filter-dropdown';
        wrapper.append(label, dropdown);
        th.textContent = '';
        th.appendChild(wrapper);

        label.addEventListener('click', event => {
            event.stopPropagation();
            closeAllDropdowns();
            dropdown.classList.toggle('visible');
            const arrow = label.querySelector('.header-filter-arrow');
            if (dropdown.classList.contains('visible')) arrow.style.transform = 'rotate(180deg)';
            else arrow.style.transform = '';
        });

        populateDropdown(cfg.key, dropdown);
    }

    function populateDropdown(key, dropdown) {
        dropdown.innerHTML = '';
        getUniqueValues(key).forEach(value => {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = value;
            if ((!filterState[key] && value === '全部') || filterState[key] === value) {
                button.classList.add('active');
            }
            button.addEventListener('click', event => {
                event.stopPropagation();
                filterState[key] = value === '全部' ? '' : value;
                updateHeaderLabels();
                closeAllDropdowns();
                applyFilters();
            });
            dropdown.appendChild(button);
        });
    }

    function applyFilters() {
        const searchValue = filterState.query.toLowerCase();
        filteredRows = [];
        allRows.forEach(row => {
            const cells = row.getElementsByTagName('td');
            const qr1 = (cells[1]?.innerText || '').toLowerCase();
            const qr2 = (cells[2]?.innerText || '').toLowerCase();
            const user = (cells[columnIndex.user]?.innerText || '').trim();
            const result = (cells[columnIndex.result]?.innerText || '').trim();
            const matchesSearch = !searchValue || qr1.includes(searchValue) || qr2.includes(searchValue);
            const matchesUser = !filterState.user || user === filterState.user;
            const matchesResult = !filterState.result || result === filterState.result;
            if (matchesSearch && matchesUser && matchesResult) {
                filteredRows.push(row);
            }
        });

        currentPage = 1;
        if (filteredRows.length === 0) {
            allRows.forEach(row => row.style.display = 'none');
            document.getElementById('pageInfo').textContent = '第 0 页 / 共 0 页';
            document.getElementById('prevPage').disabled = true;
            document.getElementById('nextPage').disabled = true;
            document.getElementById('prevPage').style.opacity = '0.5';
            document.getElementById('nextPage').style.opacity = '0.5';
            return;
        }
        renderPage(1);
    }

    document.addEventListener('DOMContentLoaded', () => {
        injectStyles();
        const table = document.getElementById('dataTable');
        const tbody = table?.querySelector('tbody');
        allRows = tbody ? Array.from(tbody.querySelectorAll('tr')) : [];

        headerConfig.forEach(cfg => {
            const th = findHeaderCell(cfg.title);
            if (th) buildDropdown(th, cfg);
        });

        updateHeaderLabels();

        const input = document.getElementById('searchInput');
        if (input) {
            input.addEventListener('input', () => {
                filterState.query = input.value;
            });
        }

        window.filterTable = function() {
            filterState.query = document.getElementById('searchInput')?.value || '';
            applyFilters();
        };

        const oldInit = window.initPagination;
        window.initPagination = function() {
            if (typeof oldInit === 'function') oldInit();
            updateHeaderLabels();
        };

        document.addEventListener('click', closeAllDropdowns);
    });
})();
</script>
    <script>
        window.onload = ()=> {
            fetch("/api/user_status")
                .then(res => res.json())
                .then(data => {
                    let statusDiv = document.getElementById("login-status");
                    if (!statusDiv) {
                        statusDiv = document.createElement("div");
                        statusDiv.id = "login-status";
                        statusDiv.style.position = "absolute";
                        statusDiv.style.top = "20px";
                        statusDiv.style.right = "20px";
                        statusDiv.style.background = "rgba(255, 255, 255, 0.9)";
                        statusDiv.style.padding = "8px 16px";
                        statusDiv.style.borderRadius = "20px";
                        statusDiv.style.fontSize = "14px";
                        statusDiv.style.fontWeight = "600";
                        statusDiv.style.color = "#667eea";
                        statusDiv.style.boxShadow = "0 4px 12px rgba(0,0,0,0.1)";
                        statusDiv.style.zIndex = "1000";
                        document.body.appendChild(statusDiv);
                    }
                    if (data.status) {
                        statusDiv.innerHTML = `👤 ${data.username || '用户'} | <a href="/logout" style="color:#dc3545;text-decoration:none;margin-left:5px;">退出</a>`;
                    } else {
                        window.location.href = "/login";
                    }
                })
                .catch(err => {
                    console.error("获取登录状态失败", err);
                });
        };

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterTable();
            }
        });
    </script>
</body>
</html>
